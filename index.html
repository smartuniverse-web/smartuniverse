<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Universe - The Future of Web3</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0e14; color: #e2e8f0; overflow-x: hidden; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background-color: #151a25; border-bottom: 1px solid #2a2f3a;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { display: flex; align-items: center; font-weight: bold; color: #fff; font-size: 20px; }
        .logo img { height: 40px; margin-right: 12px; }
        
        .auth-buttons { display: flex; gap: 12px; }
        .login-btn { background: transparent; color: #fff; border: 1px solid #2a2f3a; padding: 10px 22px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold;}
        .login-btn:hover { background: #2a2f3a; }
        .register-btn { background: #f3ba2f; color: #000; border: none; padding: 10px 22px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .register-btn:hover { background: #e5a920; transform: scale(1.05); }

        /* Hero Slider */
        .hero-slider-container { position: relative; width: 100%; height: 500px; overflow: hidden; background-color: #0b0e14; }
        .slider-wrapper { display: flex; width: 400%; height: 100%; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { width: 25%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; position: relative; padding: 0 20px; }
        
        .bg-invest { background: linear-gradient(rgba(11, 14, 20, 0.7), rgba(11, 14, 20, 0.9)), url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=1200&q=80') center/cover; }
        .bg-matrix { background: linear-gradient(rgba(11, 14, 20, 0.7), rgba(11, 14, 20, 0.9)), url('https://images.unsplash.com/photo-1639762681485-074b7f4ec651?auto=format&fit=crop&w=1200&q=80') center/cover; }
        .bg-game { background: linear-gradient(rgba(11, 14, 20, 0.7), rgba(11, 14, 20, 0.9)), url('https://images.unsplash.com/photo-1642104704074-907c0698cbd9?auto=format&fit=crop&w=1200&q=80') center/cover; }
        .bg-nft { background: linear-gradient(rgba(11, 14, 20, 0.7), rgba(11, 14, 20, 0.9)), url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&w=1200&q=80') center/cover; }

        .slide-content { max-width: 850px; z-index: 3; }
        .slide-title { font-size: 48px; color: #fff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 5px 20px #000; }
        .slide-title span { color: #f3ba2f; }
        .slide-desc { font-size: 18px; color: #cbd5e0; margin-bottom: 35px; line-height: 1.6; }
        .slide-btn { background: #f3ba2f; color: #000; padding: 15px 40px; font-size: 16px; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; text-decoration: none; transition: 0.3s; box-shadow: 0 0 20px rgba(243, 186, 47, 0.4); }
        
        .slider-dots { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 10; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s; }
        .dot.active { background: #f3ba2f; transform: scale(1.4); }

        .features-section { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 70px 20px; max-width: 1200px; margin: 0 auto; }
        .feature-box { background: #151a25; border: 1px solid #2a2f3a; padding: 35px 25px; border-radius: 15px; width: 320px; text-align: center; transition: 0.4s; }
        .feature-box:hover { border-color: #f3ba2f; transform: translateY(-10px); }

        /* Auth Modals Styling */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: #151a25; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #2a2f3a; text-align: center; }
        .modal-content input { width: 100%; background: #0b0e14; border: 1px solid #2a2f3a; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 5px; outline: none; }
        .modal-content h2 { color: #f3ba2f; margin-bottom: 20px; }
        .close-btn { color: #a0a5b1; float: right; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Smart Universe Logo">
            <span>SMART UNIVERSE</span>
        </div>
        <div class="auth-buttons">
            <button class="login-btn" onclick="openModal('loginModal')">Login</button>
            <button class="register-btn" onclick="openModal('regModal')">Join Now</button>
        </div>
    </header>

    <div id="regModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('regModal')">&times;</span>
            <h2>Create Account</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="register-btn" style="width: 100%;" onclick="signup()">Register Now</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('loginModal')">&times;</span>
            <h2>Login</h2>
            <input type="text" id="login-id" placeholder="Enter Your SUC-ID">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="register-btn" style="width: 100%;" onclick="login()">Login</button>
        </div>
    </div>

    <div class="hero-slider-container">
        <div class="slider-wrapper" id="slider">
            <div class="slide bg-invest">
                <div class="slide-content">
                    <h1 class="slide-title">Stake & Earn <span>ROI</span></h1>
                    <p class="slide-desc">Earn 3% to 12% monthly profit with USDT & SUC Tokens.</p>
                    <button class="slide-btn" onclick="openModal('regModal')">Create Free Account</button>
                </div>
            </div>
            </div>
    </div>

    <div class="features-section">
        <div class="feature-box"><i>🛡️</i><h3>Web3 Security</h3><p>Connect your wallet seamlessly.</p></div>
        <div class="feature-box"><i>💎</i><h3>SUC Utility</h3><p>Heart of our ecosystem.</p></div>
        <div class="feature-box"><i>🚀</i><h3>Instant Payouts</h3><p>No more waiting.</p></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // Modal Logic
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- Firebase Auth Logic ---
        function signup() {
            let name = document.getElementById("reg-name").value;
            let email = document.getElementById("reg-email").value;
            let pass = document.getElementById("reg-pass").value;
            let stsId = "SUC-" + Math.floor(10000 + Math.random() * 90000);

            if(name && email && pass) {
                database.ref('users/' + stsId).set({
                    name: name,
                    email: email,
                    password: pass,
                    stsId: stsId,
                    usdtBalance: 0.00,
                    status: "Active",
                    joinDate: new Date().toLocaleDateString()
                }).then(() => {
                    alert("✅ Registration Successful!\nYour ID is: " + stsId + "\nPlease Login with this ID.");
                    closeModal('regModal');
                    openModal('loginModal');
                }).catch(err => alert("Error: " + err.message));
            } else { alert("All fields are required!"); }
        }

        function login() {
            let id = document.getElementById("login-id").value;
            let pass = document.getElementById("login-pass").value;

            if(id && pass) {
                database.ref('users/' + id).once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        let user = snapshot.val();
                        if(user.password === pass) {
                            localStorage.setItem('stsUser', JSON.stringify(user));
                            window.location.href = "dashboard.html";
                        } else { alert("❌ Wrong Password!"); }
                    } else { alert("❌ ID not found!"); }
                });
            } else { alert("Enter ID & Password!"); }
        }

        // Slider Logic
        let currentSlide = 0; const dots = document.querySelectorAll('.dot'); const slider = document.getElementById('slider');
        function updateSlider() { slider.style.transform = `translateX(-${currentSlide * 25}%)`; }
        setInterval(() => { currentSlide = (currentSlide + 1) % 4; updateSlider(); }, 5000);
    </script>
</body>
</html>
