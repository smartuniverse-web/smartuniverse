<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Smart Universe</title>
    <style>
        /* CSS वही रहेगी जो आपकी पुरानी फाइल में थी */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0e14; color: #e2e8f0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #151a25; border-bottom: 1px solid #2a2f3a; }
        .logo { display: flex; align-items: center; font-weight: bold; color: #fff; font-size: 18px; }
        .logo img { height: 35px; margin-right: 10px; }
        .header-wallet-btn { background: linear-gradient(90deg, #f3ba2f, #e5a920); color: #000; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; transition: all 0.3s; }
        .header-wallet-btn.connected { background: #0b0e14; color: #00ff88; border: 1px solid #00ff88; }
        .login-btn { background: transparent; color: #fff; border: 1px solid #2a2f3a; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .dashboard-container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .dash-header { margin-bottom: 25px; }
        .dash-header h2 { color: #fff; }
        .top-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .wallet-header { flex: 1; background: linear-gradient(135deg, #151a25 0%, #0b0e14 100%); border: 1px solid #2a2f3a; border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; min-width: 300px; }
        .wallet-left .balance { font-size: 30px; color: #00ff88; font-weight: bold; }
        .btn-dep { background-color: #f3ba2f; color: #000; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .btn-wit { background-color: transparent; color: #fff; border: 1px solid #f3ba2f; padding: 8px 20px; border-radius: 5px; cursor: pointer; }
        .suc-token-box { flex: 1; background: linear-gradient(135deg, #151a25, #1a1608); border: 1px solid #f3ba2f; border-radius: 12px; padding: 20px; min-width: 300px; position: relative; overflow: hidden; }
        .referral-box { background: #151a25; border: 1px solid #2a2f3a; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .ref-input-group { display: flex; flex: 1; background: #0b0e14; border: 1px solid #2a2f3a; border-radius: 8px; overflow: hidden; }
        .ref-input-group input { flex: 1; background: transparent; border: none; color: #00ff88; padding: 12px; outline: none; }
        .ref-input-group button { background: #f3ba2f; color: #000; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .dash-box { background: #151a25; border: 1px solid #2a2f3a; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .dash-box:hover { border-color: #f3ba2f; transform: translateY(-5px); }
        .news-ticker { background: #0b0e14; border: 1px solid #2a2f3a; border-radius: 8px; padding: 8px; margin-bottom: 30px; overflow: hidden; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 20s linear infinite; color: #00ff88; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .wallet-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; }
        .wallet-modal { background: #151a25; width: 90%; max-width: 420px; padding: 25px; border-radius: 15px; border: 1px solid #f3ba2f; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo"> SMART UNIVERSE <span style="font-size: 12px; color: #00ff88; margin-left: 8px;">(SUC)</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button id="top-wallet-btn" class="header-wallet-btn" onclick="handleWalletClick()">👛 Connect Web3</button>
            <button class="login-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="dash-header">
            <h2 id="dash-name">Welcome, Loading...</h2>
            <p style="color: #a0a5b1; margin-top: 5px;">Your ID: <span id="dash-id" style="color: #f3ba2f; font-weight: bold; font-size: 18px;">SUC-00000</span></p>
        </div>

        <div class="top-row">
            <div class="wallet-header">
                <div class="wallet-left">
                    <h3>Deposit Balance (USDT)</h3>
                    <div class="balance" id="usdt-balance">$0.00</div>
                    <p class="inr-balance" id="inr-balance">≈ ₹0 INR</p>
                </div>
                <div class="wallet-right">
                    <button class="btn-dep" onclick="window.location.href='deposit.html'">Deposit USDT</button>
                    <button class="btn-wit" onclick="window.location.href='withdraw.html'">Withdraw Fund</button>
                </div>
            </div>

            <div class="suc-token-box">
                <div class="suc-balance-header">
                    <h3 style="color:#a0a5b1; font-size:13px;">My SUC Balance</h3>
                    <div class="balance" id="main-suc-balance" style="font-size: 26px; color: #f3ba2f; font-weight: bold;">0 <span style="font-size:14px; color:#fff;">SUC</span></div>
                </div>
                <div style="margin-top:15px; font-size:13px;">
                    <p>Current Price: <span style="color:#00ff88;">$0.20 USDT</span></p>
                    <p>Total Supply: <span style="color:#00ff88;">500 Million</span></p>
                </div>
                <button style="width:100%; margin-top:15px; background:#f3ba2f; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer;" onclick="alert('Presale starts soon!')">Buy SUC Token</button>
            </div>
        </div>

        <div class="referral-box">
            <div class="ref-text">
                <h3>👥 Invite & Earn</h3>
                <p>Share link to build team.</p>
            </div>
            <div class="ref-input-group">
                <input type="text" id="refLink" value="Loading..." readonly>
                <button onclick="copyReferral()">Copy</button>
            </div>
        </div>

        <div class="dash-grid">
            <div class="dash-box" onclick="window.location.href='trading.html'"><div class="f-icon">📈</div><h3>Live Trading</h3></div>
            <div class="dash-box" onclick="window.location.href='plans.html'"><div class="f-icon">💰</div><h3>Investments</h3></div>
            <div class="dash-box" onclick="window.location.href='gaming.html'"><div class="f-icon">🎮</div><h3>Gaming Zone</h3></div>
            <div class="dash-box" onclick="window.location.href='network.html'"><div class="f-icon">🤝</div><h3>My Network</h3></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // --- Firebase Live Dashboard Logic ---
        window.onload = function() {
            let user = JSON.parse(localStorage.getItem('stsUser'));
            if(!user) { window.location.href = "index.html"; return; }

            // 1. स्क्रीन पर बेसिक डेटा दिखाना
            document.getElementById('dash-name').innerText = "Welcome, " + user.name;
            document.getElementById('dash-id').innerText = user.stsId;
            document.getElementById('refLink').value = "https://smartuniverse-web.github.io/smartuniverse/index.html?ref=" + user.stsId;

            // 2. Firebase से लाइव बैलेंस खींचना
            database.ref('users/' + user.stsId).on('value', (snapshot) => {
                let data = snapshot.val();
                if(data) {
                    let usdt = data.usdtBalance || 0;
                    let suc = data.sucBalance || 0;
                    
                    document.getElementById('usdt-balance').innerText = "$" + usdt.toFixed(2);
                    document.getElementById('inr-balance').innerText = "≈ ₹" + (usdt * 92).toLocaleString() + " INR";
                    document.getElementById('main-suc-balance').innerHTML = suc.toLocaleString() + ' <span style="font-size:14px; color:#fff;">SUC</span>';
                    
                    // लोकल डेटा अपडेट रखना
                    localStorage.setItem('stsUser', JSON.stringify(data));
                }
            });
        };

        function logout() {
            localStorage.removeItem('stsUser');
            window.location.href = "index.html";
        }

        function copyReferral() {
            var copyText = document.getElementById("refLink");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("✅ Referral Link Copied!");
        }

        // Wallet Dummy Logic
        function handleWalletClick() { alert("Connect Web3 coming soon with Polygon Network!"); }
    </script>
</body>
</html>
